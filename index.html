<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tu código de verificación solicitado -->
    <meta name="ppck-ver" content="11bf7087c2c7ff9fd694fe80f127616e" />
    <title>Calculadora Profesional Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .calc-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        .display-area {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: right;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .previous-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            color: #94a3b8;
            height: 1.5rem;
            overflow: hidden;
        }

        .current-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 500;
            white-space: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 600;
            height: 60px;
            border-radius: 1rem;
            cursor: pointer;
            user-select: none;
        }

        .btn:active {
            transform: scale(0.92);
        }

        .btn-num {
            background: rgba(51, 65, 85, 0.5);
        }

        .btn-num:hover {
            background: rgba(71, 85, 105, 0.8);
        }

        .btn-op {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .btn-op:hover {
            background: rgba(59, 130, 246, 0.4);
        }

        .btn-equal {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            grid-column: span 2;
        }

        .btn-equal:hover {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .btn-clear {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }

        .btn-clear:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .history-panel {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: #64748b;
            max-height: 100px;
            overflow-y: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        /* Ocultar scrollbar */
        .current-val::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="calc-container">
        <!-- Display -->
        <div class="display-area">
            <div id="previous-display" class="previous-val"></div>
            <div id="current-display" class="current-val">0</div>
        </div>

        <!-- Buttons Grid -->
        <div class="grid grid-cols-4 gap-3">
            <!-- Row 1 -->
            <div class="btn btn-clear" onclick="clearAll()">AC</div>
            <div class="btn btn-op" onclick="appendOperator('**')">^</div>
            <div class="btn btn-op" onclick="appendOperator('%')">%</div>
            <div class="btn btn-op" onclick="deleteLast()">DEL</div>

            <!-- Row 2 -->
            <div class="btn btn-num" onclick="appendNumber('7')">7</div>
            <div class="btn btn-num" onclick="appendNumber('8')">8</div>
            <div class="btn btn-num" onclick="appendNumber('9')">9</div>
            <div class="btn btn-op" onclick="appendOperator('/')">÷</div>

            <!-- Row 3 -->
            <div class="btn btn-num" onclick="appendNumber('4')">4</div>
            <div class="btn btn-num" onclick="appendNumber('5')">5</div>
            <div class="btn btn-num" onclick="appendNumber('6')">6</div>
            <div class="btn btn-op" onclick="appendOperator('*')">×</div>

            <!-- Row 4 -->
            <div class="btn btn-num" onclick="appendNumber('1')">1</div>
            <div class="btn btn-num" onclick="appendNumber('2')">2</div>
            <div class="btn btn-num" onclick="appendNumber('3')">3</div>
            <div class="btn btn-op" onclick="appendOperator('-')">−</div>

            <!-- Row 5 -->
            <div class="btn btn-num" onclick="appendNumber('0')">0</div>
            <div class="btn btn-num" onclick="appendNumber('.')">.</div>
            <div class="btn btn-equal" onclick="calculate()">=</div>
            <div class="btn btn-op" onclick="appendOperator('+')">+</div>
        </div>

        <!-- Historial Simple -->
        <div class="history-panel" id="history-log">
            <p class="mb-1 uppercase tracking-wider text-xs font-semibold">Historial Reciente</p>
            <div id="history-items"></div>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetScreen = false;

        const currentDisplay = document.getElementById('current-display');
        const previousDisplay = document.getElementById('previous-display');
        const historyItems = document.getElementById('history-items');

        function updateDisplay() {
            currentDisplay.textContent = currentInput;
            previousDisplay.textContent = previousInput;
        }

        function appendNumber(number) {
            if (currentInput === '0' || shouldResetScreen) {
                currentInput = number;
                shouldResetScreen = false;
            } else {
                if (number === '.' && currentInput.includes('.')) return;
                currentInput += number;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== null) calculate();
            previousInput = currentInput + ' ' + (op === '**' ? '^' : op);
            operator = op;
            shouldResetScreen = true;
            updateDisplay();
        }

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length === 1) {
                currentInput = '0';
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();
        }

        function calculate() {
            if (operator === null || shouldResetScreen) return;
            
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            if (isNaN(prev) || isNaN(current)) return;

            try {
                switch (operator) {
                    case '+': result = prev + current; break;
                    case '-': result = prev - current; break;
                    case '*': result = prev * current; break;
                    case '/': 
                        if (current === 0) throw new Error("Div/0");
                        result = prev / current; 
                        break;
                    case '%': result = prev % current; break;
                    case '**': result = Math.pow(prev, current); break;
                    default: return;
                }

                const calculationString = `${prev} ${operator === '**' ? '^' : operator} ${current} = ${result}`;
                addToHistory(calculationString);

                currentInput = result.toString();
                operator = null;
                previousInput = '';
                shouldResetScreen = true;
                updateDisplay();

            } catch (error) {
                currentInput = "Error";
                shouldResetScreen = true;
                updateDisplay();
            }
        }

        function addToHistory(text) {
            const div = document.createElement('div');
            div.className = 'text-xs text-slate-500 py-1 border-b border-white/5';
            div.textContent = text;
            historyItems.prepend(div);
            
            if (historyItems.children.length > 3) {
                historyItems.lastChild.remove();
            }
        }

        // Manejo de teclado físico
        window.addEventListener('keydown', (e) => {
            if (e.key >= 0 && e.key <= 9) appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '=' || e.key === 'Enter') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearAll();
            if (['+', '-', '*', '/', '%'].includes(e.key)) appendOperator(e.key);
        });

    </script>
</body>
</html>
